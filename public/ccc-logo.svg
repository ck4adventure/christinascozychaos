<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background circle gradient -->
    <radialGradient id="bgGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7B3F6E"/>
      <stop offset="100%" stop-color="#2A0E30"/>
    </radialGradient>

    <!-- Moon gradient -->
    <radialGradient id="moonGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F5EAE0"/>
      <stop offset="60%" stop-color="#E8D5C4"/>
      <stop offset="100%" stop-color="#C49A7A"/>
    </radialGradient>

    <!-- Amber glow filter -->
    <filter id="amberGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for moon -->
    <filter id="moonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#C46A00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#C46A00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8A020" stop-opacity="0.8"/>
    </linearGradient>

    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="82"/>
    </clipPath>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" stroke-dasharray="6 4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#ringGrad2)" stroke-width="0.6"/>

  <!-- Main background circle -->
  <circle cx="100" cy="100" r="82" fill="url(#bgGrad)"/>

  <!-- Subtle inner nebula -->
  <ellipse cx="75" cy="80" rx="50" ry="40" fill="#7B3F6E" opacity="0.35" clip-path="url(#circleClip)"/>
  <ellipse cx="125" cy="125" rx="40" ry="35" fill="#C46A00" opacity="0.12" clip-path="url(#circleClip)"/>

  <!-- Crescent moon -->
  <g filter="url(#moonGlow)">
    <!-- Full moon circle -->
    <circle cx="95" cy="95" r="35" fill="url(#moonGrad)"/>
    <!-- Overlay circle to cut crescent -->
    <circle cx="108" cy="88" r="28" fill="#2A0E30"/>
    <!-- Slight purple tint on shadow edge -->
    <circle cx="108" cy="88" r="28" fill="#7B3F6E" opacity="0.3"/>
  </g>

  <!-- Stars scattered around moon -->
  <!-- Large 4-point star top right -->
  <g filter="url(#amberGlow)" transform="translate(148, 58)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#E8A020"/>
  </g>

  <!-- Medium star bottom left -->
  <g filter="url(#amberGlow)" transform="translate(55, 138)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#E8A020" opacity="0.9"/>
  </g>

  <!-- Small star top left -->
  <g transform="translate(68, 58)">
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#E8A020" opacity="0.75"/>
  </g>

  <!-- Tiny dot stars -->
  <circle cx="140" cy="110" r="1.8" fill="#E8A020" opacity="0.7"/>
  <circle cx="130" cy="148" r="1.4" fill="#E8A020" opacity="0.55"/>
  <circle cx="72" cy="110" r="1.2" fill="#F5EAE0" opacity="0.6"/>
  <circle cx="155" cy="82" r="1" fill="#F5EAE0" opacity="0.5"/>
  <circle cx="60" cy="75" r="1" fill="#E8A020" opacity="0.45"/>
  <circle cx="148" cy="135" r="1.5" fill="#E8A020" opacity="0.5"/>
  <circle cx="80" cy="155" r="1" fill="#F5EAE0" opacity="0.4"/>

  <!-- Whimsical small spark / comet streak -->
  <line x1="118" y1="68" x2="138" y2="52" stroke="#E8A020" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="118" y1="68" x2="140" y2="56" stroke="#E8A020" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Outer ring tick marks (like a compass or clock — whimsical detail) -->
  <g stroke="#E8A020" stroke-width="1" opacity="0.25">
    <line x1="100" y1="8" x2="100" y2="16"/>
    <line x1="100" y1="184" x2="100" y2="192"/>
    <line x1="8" y1="100" x2="16" y2="100"/>
    <line x1="184" y1="100" x2="192" y2="100"/>
    <line x1="29" y1="29" x2="35" y2="35"/>
    <line x1="165" y1="165" x2="171" y2="171"/>
    <line x1="171" y1="29" x2="165" y2="35"/>
    <line x1="35" y1="165" x2="29" y2="171"/>
  </g>
</svg>
